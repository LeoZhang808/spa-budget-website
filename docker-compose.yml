version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: expense_budget_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: budget_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: expense_budget_backend
    environment:
      NODE_ENV: development
      PORT: "4000"
      DATABASE_URL: mysql://appuser:apppassword@db:3306/budget_app
      JWT_SECRET: dev-jwt-secret-changeme
      REFRESH_TOKEN_SECRET: dev-refresh-secret-changeme
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: expense_budget_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
